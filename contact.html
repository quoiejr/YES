    <meta charset="UTF-8" />

    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <a href="index.html" class="logo-container">
        <img
          src="https://res.cloudinary.com/dqfcitcay/image/upload/v1777563697/f122382f-c7b9-4ed7-9f1c-4508e2b38d8b_pmw5ug.jpg"
          alt="YES Logo"
          class="logo-icon"
        />
        <span class="logo-text">YES</span>
      </a>
      <div class="hamburger"><span></span><span></span><span></span></div>
      <nav>
        <a href="index.html">Home</a>
        <a href="project.html">Project</a>

        <a href="events.html">Events</a>
        <a href="team.html">Our Team</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>
    <section class="container">
      <h2 class="section-title">Get In Touch</h2>
      <div class="grid grid-2">
        <div class="contact-form-container">
          <form
            id="contact-form"
            action="https://formspree.io/f/YOUR_ID_HERE"
            method="POST"
          >
            <div style="margin-bottom: 15px">
              <label
                for="name"
                style="display: block; font-weight: bold; margin-bottom: 5px"
                >Name</label
              >
              <input
                type="text"
                id="name"
                name="name"
                placeholder="Your Name"
                required
                style="
                  width: 100%;
                  padding: 12px;
                  border: 2px solid #ddd;
                  border-radius: 4px;
                "
              />
            </div>

            <div style="margin-bottom: 15px">
              <label
                for="email"
                style="display: block; font-weight: bold; margin-bottom: 5px"
                >Email</label
              >
              <input
                type="email"
                id="email"
                name="email"
                placeholder="email@example.com"
                required
                style="
                  width: 100%;
                  padding: 12px;
                  border: 2px solid #ddd;
                  border-radius: 4px;
                "
              />
            </div>

            <div style="margin-bottom: 15px">
              <label
                for="message"
                style="display: block; font-weight: bold; margin-bottom: 5px"
                >Message</label
              >
              <textarea
                id="message"
                name="message"
                rows="5"
                placeholder="How can we help?"
                required
                style="
                  width: 100%;
                  padding: 12px;
                  border: 2px solid #ddd;
                  border-radius: 4px;
                  resize: vertical;
                "
              ></textarea>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%">
              Send Message
            </button>
          </form>
          <div
            id="form-status"
            style="margin-top: 15px; text-align: center; font-weight: bold"
          ></div>
        </div>

        <div class="contact-info">
          <div style="margin-bottom: 30px">
            <h3>Direct Contact</h3>
            <p style="margin-top: 15px">
              <strong>Phone:</strong>
              <a href="tel:+231889660665" class="deep-black-link"
                >+231 889-660-665</a
              >
              <br />
              <a href="tel:+231760591570" class="deep-black-link"
                >+231 760-591-570</a
              >
            </p>
            <p>
              <strong>Email:</strong>
              <a href="mailto:yesliberia1@gmail.com" class="deep-black-link"
                >yesliberia1@gmail.com</a
              >
            </p>
          </div>

          <div style="display: flex; gap: 20px; margin-top: 15px">
            <a
              href="https://www.facebook.com/youth.empowerment.solidarity"
              target="_blank"
              aria-label="Facebook"
              class="social-item"
            >
              <img
                src="https://res.cloudinary.com/dqfcitcay/image/upload/v1778803711/Facebook_Logo_2023_dpo89s.png"
                alt="Facebook"
                style="width: 35px; border-radius: 50%"
              />
            </a>

            <a href="#" aria-label="Instagram" class="social-item">
              <img
                src="https://res.cloudinary.com/dqfcitcay/image/upload/v1778803987/download_xijukk.jpg"
                alt="Instagram"
                style="width: 35px; border-radius: 50%"
              />
            </a>
            <a href="#" aria-label="Twitter" class="social-item">
              <img
                src="https://res.cloudinary.com/dqfcitcay/image/upload/v1778804162/Logo_of_Twitter.svg_nzpuqj.png"
                alt="Twitter"
                style="width: 35px; border-radius: 50%"
              />
            </a>
          </div>
        </div>
      </div>
